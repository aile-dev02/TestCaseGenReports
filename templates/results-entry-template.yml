# ═══════════════════════════════════════════════════
# results.yml エントリ テンプレート
# ═══════════════════════════════════════════════════
#
# 【使い方】
#   1. 対象リリースの runs/{リリース名}/results.yml を開く
#   2. 以下のエントリをコピーして末尾に追加する
#   3. テストケース ID・各フィールドを実際の値に書き換える
#   4. 不要な任意フィールドは削除してよい
#
# ═══════════════════════════════════════════════════

# ──────────────────────────────
# ▼ PASS の場合
# ──────────────────────────────
XXXX-001:
  ステータス: 
  担当者: 
  完了日時: 
  エビデンス:
    - 

# ──────────────────────────────
# ▼ FAIL の場合
# ──────────────────────────────
XXXX-002:
  ステータス: 
  担当者: 
  完了日時: 
  不具合: 
  メモ: 
  エビデンス:
    - 

# ──────────────────────────────
# ▼ SKIP の場合
# ──────────────────────────────
XXXX-003:
  ステータス: 
  担当者: 
  メモ: 

# ──────────────────────────────
# ▼ 未実施の場合（省略も可）
# ──────────────────────────────
XXXX-004:
  ステータス: 
  メモ: 


# ═══════════════════════════════════════════════════
# フィールド説明
# ═══════════════════════════════════════════════════
#
# キー（行頭）: テストケース ID（master/testcases/ の id フィールドと一致させる）
#
# ステータス  【必須】実行結果
#               PASS        — 全期待結果が確認できた
#               FAIL        — 1つ以上の期待結果が満たされなかった
#               SKIP        — 実行をスキップした（環境未整備・対象外等）
#               NOT_EXECUTED — 未実施（ステータス省略時のデフォルト）
#
# 担当者     【任意】テストを実行した担当者名
#
# 完了日時   【任意】ISO 8601 形式（例: "2026-05-11T14:30:00"）
#              ダブルクォートで囲むこと
#
# 不具合     【任意】FAIL 時のバグチケット ID（例: BUG-192）
#
# メモ       【任意】補足コメント・不具合の概要・スキップ理由など
#
# エビデンス 【任意】スクリーンショット・ログファイルへの相対パス一覧
#              runs/{リリース名}/evidence/ 以下に配置することを推奨
#
# ═══════════════════════════════════════════════════
# 実際の results.yml 例
# ═══════════════════════════════════════════════════
#
# AUTH-001:
#   ステータス: PASS
#   担当者: yamada
#   完了日時: "2026-05-11T10:00:00"
#   エビデンス:
#     - evidence/AUTH-001/login-screen.png
#     - evidence/AUTH-001/dashboard.png
#
# AUTH-002:
#   ステータス: FAIL
#   担当者: yamada
#   完了日時: "2026-05-11T10:30:00"
#   不具合: BUG-192
#   メモ: "試行失敗カウントが記録されない"
#   エビデンス:
#     - evidence/AUTH-002/error-screen.png
#
# AUTH-003:
#   ステータス: NOT_EXECUTED
