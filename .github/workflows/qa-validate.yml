name: QAバリデーション

# Runs on every push that touches test cases or schemas, and on all PRs.
# Blocks merging if any test case fails validation.

on:
  push:
    paths:
      - 'master/testcases/**'
      - 'master/requirements/**'
      - 'schemas/**'
      - 'scripts/validate-testcases.ts'
      - 'scripts/lib/parser.ts'
      - 'scripts/lib/loader.ts'
      - 'scripts/lib/types.ts'
  pull_request:
    paths:
      - 'master/testcases/**'
      - 'master/requirements/**'
      - 'schemas/**'
      - 'scripts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: テストケースをバリデーション
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js 20環境のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存関係をインストール
        run: npm ci

      - name: テストケースをバリデーション
        run: npm run validate

      - name: 結果をサマリーに出力
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ **すべてのテストケースがバリデーションを通過しました。**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **バリデーションエラーが発生しました。下部のログを確認してください。**" >> $GITHUB_STEP_SUMMARY
          fi
