name: QAレポート生成

on:
  push:
    branches:
      - '**'
    paths:
      - 'master/**'
      - 'runs/**'
      - 'scripts/**'
      - 'schemas/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID (e.g. 2026-05-release). Leave blank to use latest.'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa-report:
    name: QAレポート生成
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout ────────────────────────────────────────
      - name: チェックアウト
        uses: actions/checkout@v4

      # ── Node.js setup ───────────────────────────────────
      - name: Node.js 20環境のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Dependencies ────────────────────────────────────
      - name: 依存関係をインストール
        run: npm ci

      # ── Validate ────────────────────────────────────────
      - name: テストケースをバリデーション
        run: npm run validate

      # ── Generate reports ────────────────────────────────
      - name: Excelレポートを生成
        run: npm run generate:excel

      - name: QAサマリを生成
        run: npm run generate:summary

      - name: トレーサビリティマトリクスを生成
        run: npm run generate:traceability

      # ── Summarise in GitHub Actions ──────────────────────
      - name: レポート概要をGitHub Actionsのサマリーに出力
        run: |
          echo "## QA Report Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| test-report.xlsx | 全テストケース + 実行結果 (Excel) |" >> $GITHUB_STEP_SUMMARY
          echo "| qa-summary.md | PASS/FAIL/SKIP 集計サマリ |" >> $GITHUB_STEP_SUMMARY
          echo "| traceability.md | 要件↔テストケース対応表 |" >> $GITHUB_STEP_SUMMARY
          echo "| traceability.xlsx | トレーサビリティ (Excel) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat reports/latest/qa-summary.md >> $GITHUB_STEP_SUMMARY

      # ── Upload artifacts ────────────────────────────────
      - name: QAレポートをアップロード
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports-${{ github.sha }}
          path: reports/latest/
          retention-days: 90
          if-no-files-found: error
